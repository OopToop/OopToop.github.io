<!DOCTYPE html>
<html>
<head>
    <title>Upload - OopToop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <div class="topbar__left">
        <a class="topbar__brand" href="/">
            <img class="topbar__logo" src="/logo.png" alt="OopToop logo">
            <div class="topbar__title">OopToop</div>
        </a>
    </div>

    <div class="topbar__center">
        <input class="topbar__search" type="text" placeholder="Search">
    </div>

    <div class="topbar__right">
        <a class="topbar__upload" href="/upload.html">Upload</a>
    </div>
</header>

<nav class="topnav">
    <a class="topnav__link" href="/">Home</a>
    <a class="topnav__link" href="/channel.html">Channels</a>
</nav>

<main class="page-content">
    <section class="upload-panel upload-panel--page">
        <h2>Upload a video</h2>
        <p class="upload-panel__hint">Choose a video file and thumbnail, then enter a channel name. If it does not exist yet, it will be created automatically.</p>
        <form id="uploadForm" class="upload-form">
            <label class="upload-field">
                <span>Action</span>
                <select name="mode" id="uploadMode">
                    <option value="new">Upload New Video</option>
                    <option value="reroll">Reroll Stats of Old Video</option>
                </select>
            </label>

            <label class="upload-field">
                <span>Video title</span>
                <input type="text" name="title" placeholder="Video title" required>
            </label>

            <label class="upload-field">
                <span>Channel</span>
                <input type="text" name="channel" id="channelInput" placeholder="Channel name" required>
            </label>

            <label class="upload-field">
                <span>Upload date</span>
                <input type="date" name="uploadDate" required>
            </label>

            <div id="oldVideoSection" class="upload-popularity" hidden>
                <label class="upload-field">
                    <span>Old video</span>
                    <select name="videoId" id="rerollVideoSelect"></select>
                </label>
            </div>

            <div id="popularitySection" class="upload-popularity" hidden>
                <label class="upload-field">
                    <span>Popularity</span>
                    <select name="popularity" id="popularitySelect">
                        <option value="random" selected>Random</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="viral">Viral</option>
                        <option value="super-viral">Super Viral</option>
                    </select>
                </label>
            </div>

            <label class="upload-field upload-field--file">
                <span>Video file</span>
                <input id="videoInput" type="file" name="video" accept="video/*" required>
            </label>

            <label class="upload-field upload-field--file">
                <span>Thumbnail</span>
                <input id="thumbnailInput" type="file" name="thumbnail" accept="image/*" required>
            </label>

            <button type="submit">Upload</button>
        </form>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
